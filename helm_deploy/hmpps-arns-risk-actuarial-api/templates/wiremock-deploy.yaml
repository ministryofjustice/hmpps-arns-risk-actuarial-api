{{- if .Values.manage_offences_api_wiremock.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
 name: hmpps-manage-offences-api-wiremock-mapping
 annotations:
   "helm.sh/hook": pre-install,pre-upgrade
   "helm.sh/hook-weight": "-5"
   "helm.sh/hook-delete-policy": before-hook-creation
data:
{{ ($.Files.Glob "__files/get-actuarial-mapping.json").AsConfig | indent 2 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hmpps-manage-offences-api-wiremock
  labels:
    app.kubernetes.io/name: hmpps-manage-offences-api-wiremock
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hmpps-manage-offences-api-wiremock
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hmpps-manage-offences-api-wiremock
    spec:
      securityContext:
        runAsUser: 1000
      containers:
        - name: hmpps-manage-offences-api-wiremock
          image: wiremock/wiremock
          command: ["/docker-entrypoint.sh", "--no-request-journal", "--global-response-templating"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: mappings-volume
              mountPath: /home/wiremock/mappings
          livenessProbe:
            httpGet:
              path: /__admin/mappings
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: mappings-volume
          configMap:
            name: hmpps-manage-offences-api-wiremock-mapping
---
apiVersion: v1
kind: Service
metadata:
  name: hmpps-manage-offences-api-wiremock
spec:
  selector:
    app.kubernetes.io/name: hmpps-manage-offences-api-wiremock
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
{{- end }}